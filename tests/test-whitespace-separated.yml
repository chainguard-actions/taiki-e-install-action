name: Test whitespace-separated tool list
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install tools using whitespace-separated list
        id: action
        uses: .
        with:
          tool: |
            shfmt
            typos
      - name: Assert shfmt is installed
        run: |
          echo "Checking shfmt is available..."
          if ! command -v shfmt > /dev/null 2>&1; then
            echo "FAIL: shfmt not found in PATH"
            exit 1
          fi
          echo "shfmt version: $(shfmt --version)"
          echo "PASS: shfmt is installed"
      - name: Assert typos is installed
        run: |
          echo "Checking typos is available..."
          if ! command -v typos > /dev/null 2>&1; then
            echo "FAIL: typos not found in PATH"
            exit 1
          fi
          echo "typos version: $(typos --version)"
          echo "PASS: typos is installed"
