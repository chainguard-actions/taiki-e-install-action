name: Test whitespace-separated tool list
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tool: |
            shellcheck
            shfmt
          checksum: 'true'
          fallback: 'none'
      - name: Assert shellcheck is installed
        run: |
          echo "Checking shellcheck is available..."
          if ! command -v shellcheck > /dev/null 2>&1; then
            echo "FAIL: shellcheck not found in PATH"
            exit 1
          fi
          echo "PASS: shellcheck installed: $(shellcheck --version | grep 'version:' | awk '{print $2}')"
      - name: Assert shfmt is installed
        run: |
          echo "Checking shfmt is available..."
          if ! command -v shfmt > /dev/null 2>&1; then
            echo "FAIL: shfmt not found in PATH"
            exit 1
          fi
          echo "PASS: shfmt installed: $(shfmt --version)"
