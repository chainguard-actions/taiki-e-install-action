name: Test basic tool installation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tool: jq
          checksum: 'true'
          fallback: 'cargo-binstall'
      - name: Assert jq is installed
        run: |
          if ! command -v jq > /dev/null 2>&1; then
            echo "FAIL: jq was not installed"
            exit 1
          fi
          echo "PASS: jq is installed"
          jq --version
