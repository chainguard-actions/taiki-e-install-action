name: Test basic tool installation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tool: ripgrep
      - name: Assert ripgrep is installed
        run: |
          echo "Checking if rg is available..."
          if ! command -v rg > /dev/null 2>&1; then
            echo "FAIL: rg (ripgrep) was not found in PATH"
            exit 1
          fi
          echo "rg version: $(rg --version)"
          echo "PASS: ripgrep is installed"
