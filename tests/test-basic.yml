name: Test basic tool installation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tool: shellcheck
      - name: Assert shellcheck is installed
        run: |
          echo "Checking if shellcheck is installed..."
          if ! command -v shellcheck > /dev/null 2>&1; then
            echo "FAIL: shellcheck was not found in PATH"
            exit 1
          fi
          SC_VERSION=$(shellcheck --version | head -2 | tail -1)
          echo "actual: $SC_VERSION"
          echo "PASS: shellcheck is installed: $SC_VERSION"
