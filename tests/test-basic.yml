name: Test basic tool installation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tool: shellcheck
          checksum: 'true'
          fallback: 'none'
      - name: Assert shellcheck is installed and functional
        run: |
          echo "Checking shellcheck is available..."
          if ! command -v shellcheck > /dev/null 2>&1; then
            echo "FAIL: shellcheck not found in PATH"
            exit 1
          fi
          VERSION=$(shellcheck --version | grep 'version:' | awk '{print $2}')
          echo "actual: $VERSION"
          if [ -z "$VERSION" ]; then
            echo "FAIL: shellcheck --version returned empty"
            exit 1
          fi
          echo "PASS: shellcheck installed successfully: $VERSION"
