name: Test tool installation with checksum disabled
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tool: just
          checksum: 'false'
      - name: Assert just is installed even without checksum
        run: |
          echo "Checking just installation..."
          if ! command -v just > /dev/null 2>&1; then
            echo "FAIL: just not found in PATH"
            exit 1
          fi
          echo "just version: $(just --version)"
          echo "PASS: just is installed with checksum disabled"
