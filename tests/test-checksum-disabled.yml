name: Test installation with checksum disabled
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tool: shfmt
          checksum: 'false'
      - name: Assert shfmt is installed even without checksum verification
        run: |
          echo "Checking shfmt installation (checksum disabled)..."
          if ! command -v shfmt > /dev/null 2>&1; then
            echo "FAIL: shfmt was not found in PATH"
            exit 1
          fi
          SHFMT_VERSION=$(shfmt --version)
          echo "actual: $SHFMT_VERSION"
          echo "PASS: shfmt is installed with checksum disabled: $SHFMT_VERSION"
