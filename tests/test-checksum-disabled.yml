name: Test installation with checksum disabled
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tool: shellcheck
          checksum: 'false'
      - name: Assert shellcheck is installed even without checksum verification
        run: |
          echo "Checking shellcheck installation (checksum disabled)..."
          if ! command -v shellcheck > /dev/null 2>&1; then
            echo "FAIL: shellcheck was not found in PATH"
            exit 1
          fi
          SC_VERSION=$(shellcheck --version | grep 'version:' | awk '{print $2}')
          echo "actual: $SC_VERSION"
          echo "PASS: shellcheck is installed with checksum disabled: $SC_VERSION"
