name: Test specific version installation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tool: shfmt@3.13.0
      - name: Assert shfmt 3.13.0 is installed
        run: |
          echo "Checking shfmt version..."
          if ! command -v shfmt > /dev/null 2>&1; then
            echo "FAIL: shfmt not found in PATH"
            exit 1
          fi
          SHFMT_VERSION=$(shfmt --version 2>&1)
          echo "shfmt version: $SHFMT_VERSION"
          if [ "$SHFMT_VERSION" != "v3.13.0" ]; then
            echo "FAIL: expected v3.13.0, got $SHFMT_VERSION"
            exit 1
          fi
          echo "PASS: shfmt 3.13.0 is installed"
