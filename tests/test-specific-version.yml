name: Test specific version installation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tool: shellcheck@0.10.0
          checksum: 'true'
          fallback: 'none'
      - name: Assert shellcheck specific version is installed
        run: |
          echo "Checking shellcheck is available..."
          if ! command -v shellcheck > /dev/null 2>&1; then
            echo "FAIL: shellcheck not found in PATH"
            exit 1
          fi
          VERSION=$(shellcheck --version | grep 'version:' | awk '{print $2}')
          echo "actual: $VERSION"
          if [ "$VERSION" != "0.10.0" ]; then
            echo "FAIL: expected 0.10.0 but got $VERSION"
            exit 1
          fi
          echo "PASS: shellcheck 0.10.0 installed successfully"
