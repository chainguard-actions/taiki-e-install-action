name: Test specific version installation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tool: just@1.55.0
      - name: Assert just specific version is installed
        run: |
          echo "Checking if just is available..."
          if ! command -v just > /dev/null 2>&1; then
            echo "FAIL: just not found in PATH"
            exit 1
          fi
          VERSION="$(just --version)"
          echo "just version: $VERSION"
          if ! echo "$VERSION" | grep -q "1.55.0"; then
            echo "FAIL: expected version 1.55.0 but got: $VERSION"
            exit 1
          fi
          echo "PASS: just 1.55.0 installed successfully"
