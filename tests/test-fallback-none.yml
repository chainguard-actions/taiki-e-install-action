name: Test tool installation with fallback disabled
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install shellcheck with fallback set to none
        id: action
        uses: .
        with:
          tool: shellcheck
          fallback: none
      - name: Assert shellcheck is installed and executable
        run: |
          echo "Checking shellcheck is available..."
          if ! command -v shellcheck > /dev/null 2>&1; then
            echo "FAIL: shellcheck not found in PATH"
            exit 1
          fi
          echo "shellcheck version: $(shellcheck --version | head -2)"
          echo "PASS: shellcheck is installed (fallback=none)"
