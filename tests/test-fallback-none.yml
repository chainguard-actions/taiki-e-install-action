name: Test installation with fallback disabled
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tool: shellcheck
          fallback: 'none'
      - name: Assert shellcheck is installed with fallback=none
        run: |
          echo "Checking if shellcheck is available..."
          if ! command -v shellcheck > /dev/null 2>&1; then
            echo "FAIL: shellcheck not found in PATH"
            exit 1
          fi
          echo "shellcheck version: $(shellcheck --version)"
          echo "PASS: shellcheck installed successfully with fallback=none"
