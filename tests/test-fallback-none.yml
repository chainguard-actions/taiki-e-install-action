name: Test tool installation with fallback none
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tool: shfmt
          fallback: 'none'
      - name: Assert shfmt is installed with fallback none
        run: |
          echo "Checking shfmt installation (fallback=none)..."
          if ! command -v shfmt > /dev/null 2>&1; then
            echo "FAIL: shfmt was not found in PATH"
            exit 1
          fi
          SHFMT_VERSION=$(shfmt --version)
          echo "actual: $SHFMT_VERSION"
          echo "PASS: shfmt is installed with fallback=none: $SHFMT_VERSION"
