name: Test installation with fallback disabled
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install shellcheck with fallback disabled
        id: install
        uses: .
        with:
          tool: shellcheck
          fallback: none
      - name: Assert shellcheck is installed
        run: |
          echo "Checking shellcheck is available..."
          if ! command -v shellcheck > /dev/null 2>&1; then
            echo "FAIL: shellcheck not found in PATH"
            exit 1
          fi
          SC_VERSION=$(shellcheck --version 2>&1 | head -2)
          echo "shellcheck version: $SC_VERSION"
          echo "PASS: shellcheck is installed with fallback=none"
