name: Test multiple tool installation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install multiple tools via action
        id: action
        uses: .
        with:
          tool: just,shfmt
          checksum: 'true'
          fallback: 'none'
      - name: Assert just is installed
        run: |
          echo "Checking just is on PATH..."
          if ! command -v just > /dev/null 2>&1; then
            echo "FAIL: just not found on PATH"
            exit 1
          fi
          echo "PASS: just found: $(just --version | head -1)"
      - name: Assert shfmt is installed
        run: |
          echo "Checking shfmt is on PATH..."
          if ! command -v shfmt > /dev/null 2>&1; then
            echo "FAIL: shfmt not found on PATH"
            exit 1
          fi
          echo "PASS: shfmt found: $(shfmt --version | head -1)"
