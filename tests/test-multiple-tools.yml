name: Test multiple tool installation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install multiple tools via action
        id: action
        uses: .
        with:
          tool: shellcheck,shfmt
      - name: Assert shellcheck is installed
        run: |
          echo "Checking shellcheck is available..."
          if ! command -v shellcheck > /dev/null 2>&1; then
            echo "FAIL: shellcheck not found in PATH"
            exit 1
          fi
          SC_VERSION=$(shellcheck --version 2>&1 | head -2)
          echo "shellcheck version: $SC_VERSION"
          echo "PASS: shellcheck is installed"
      - name: Assert shfmt is installed
        run: |
          echo "Checking shfmt is available..."
          if ! command -v shfmt > /dev/null 2>&1; then
            echo "FAIL: shfmt not found in PATH"
            exit 1
          fi
          SHFMT_VERSION=$(shfmt --version 2>&1)
          echo "shfmt version: $SHFMT_VERSION"
          echo "PASS: shfmt is installed"
