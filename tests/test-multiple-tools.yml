name: Test multiple tool installation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tool: shellcheck,shfmt
        env:
          RUNNER_OS: Linux
          RUNNER_ARCH: X64
      - name: Assert shellcheck is installed
        run: |
          echo "Checking if shellcheck is installed..."
          if ! command -v shellcheck > /dev/null 2>&1; then
            echo "FAIL: shellcheck was not found in PATH"
            exit 1
          fi
          echo "shellcheck version: $(shellcheck --version | head -2)"
          echo "PASS: shellcheck installed"
      - name: Assert shfmt is installed
        run: |
          echo "Checking if shfmt is installed..."
          if ! command -v shfmt > /dev/null 2>&1; then
            echo "FAIL: shfmt was not found in PATH"
            exit 1
          fi
          echo "shfmt version: $(shfmt --version)"
          echo "PASS: shfmt installed"
