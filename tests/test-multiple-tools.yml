name: Test multiple tools installation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install multiple tools
        id: action
        uses: .
        with:
          tool: shellcheck,shfmt
      - name: Assert shellcheck is installed
        run: |
          echo "Checking if shellcheck is available..."
          if ! command -v shellcheck > /dev/null 2>&1; then
            echo "FAIL: shellcheck not found in PATH"
            exit 1
          fi
          echo "shellcheck version: $(shellcheck --version)"
          echo "PASS: shellcheck found"
      - name: Assert shfmt is installed
        run: |
          echo "Checking if shfmt is available..."
          if ! command -v shfmt > /dev/null 2>&1; then
            echo "FAIL: shfmt not found in PATH"
            exit 1
          fi
          echo "shfmt version: $(shfmt --version)"
          echo "PASS: shfmt found"
